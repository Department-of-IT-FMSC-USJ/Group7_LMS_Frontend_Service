<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Exam Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Poppins','sans-serif']}}}}</script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen text-sm text-gray-700">

    <nav class="flex gap-1 px-6 py-2 bg-white border-b border-gray-200">
        <button class="sub-tab px-5 py-2 rounded-none text-sm font-medium bg-emerald-600 text-white" data-target="users-section">Users</button>
        <button class="sub-tab px-5 py-2 rounded-none text-sm font-medium text-gray-500 hover:bg-gray-100" data-target="stats-section">Statistics</button>
        <button class="sub-tab px-5 py-2 rounded-none text-sm font-medium text-gray-500 hover:bg-gray-100" data-target="settings-section">Settings</button>
    </nav>

    <div id="users-section" class="p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-sm font-semibold">User Management</h3>
            <select id="role-filter" class="px-4 py-2 border border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none">
                <option value="">All Roles</option>
                <option value="TEACHER">Teachers</option>
                <option value="STUDENT">Students</option>
                <option value="ADMIN">Admins</option>
            </select>
        </div>
        <div id="users-container"></div>
    </div>

    <div id="stats-section" class="p-6 hidden">
        <h3 class="text-sm font-semibold mb-4">System Statistics</h3>
        <div id="stats-content"></div>
    </div>

    <div id="settings-section" class="p-6 hidden">
        <h3 class="text-sm font-semibold mb-4">System Settings</h3>
        <div id="settings-content"></div>
    </div>

    <script src="../shared/api.js"></script>
    <script src="../shared/helpers.js"></script>
    <script src="../shared/ui.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
