<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Poppins','sans-serif']}}}}</script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center text-sm text-gray-700">

    <div class="bg-white rounded-none p-8 w-[480px] max-w-[95vw] shadow-lg">
        <h1 class="text-center text-base font-semibold text-gray-800 mb-5"><i class="fa-solid fa-file-lines mr-1"></i>Exam Platform</h1>

        <!-- Tabs -->
        <div class="flex border-b-2 border-gray-200 mb-4">
            <button id="login-tab" class="flex-1 py-2 text-center text-xs font-semibold text-emerald-700 border-b-2 border-emerald-600 -mb-[2px] transition cursor-pointer" onclick="showTab('login')">Login</button>
            <button id="register-tab" class="flex-1 py-2 text-center text-xs text-gray-400 border-b-2 border-transparent -mb-[2px] transition cursor-pointer" onclick="showTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <form id="login-form">
            <input type="email" id="login-email" placeholder="Email" required
                class="w-full px-3 py-2.5 mb-2.5 border border-gray-200 rounded-none text-xs focus:border-emerald-600 focus:outline-none transition">
            <input type="password" id="login-password" placeholder="Password" required
                class="w-full px-3 py-2.5 mb-2.5 border border-gray-200 rounded-none text-xs focus:border-emerald-600 focus:outline-none transition">
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-2.5 rounded-none text-xs font-semibold transition cursor-pointer">Login</button>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="hidden">
            <input type="text" id="reg-username" placeholder="Username" required
                class="w-full px-3 py-2.5 mb-2.5 border border-gray-200 rounded-none text-xs focus:border-emerald-600 focus:outline-none transition">
            <input type="email" id="reg-email" placeholder="Email" required
                class="w-full px-3 py-2.5 mb-2.5 border border-gray-200 rounded-none text-xs focus:border-emerald-600 focus:outline-none transition">
            <input type="password" id="reg-password" placeholder="Password" required
                class="w-full px-3 py-2.5 mb-2.5 border border-gray-200 rounded-none text-xs focus:border-emerald-600 focus:outline-none transition">
            <input type="text" id="reg-nic" placeholder="NIC"
                class="w-full px-3 py-2.5 mb-2.5 border border-gray-200 rounded-none text-xs focus:border-emerald-600 focus:outline-none transition">
            <input type="text" id="reg-contact" placeholder="Contact Number"
                class="w-full px-3 py-2.5 mb-2.5 border border-gray-200 rounded-none text-xs focus:border-emerald-600 focus:outline-none transition">
            <div class="flex gap-2">
                <input type="date" id="reg-dob"
                    class="flex-1 min-w-0 px-3 py-2.5 mb-2.5 border border-gray-200 rounded-none text-xs focus:border-emerald-600 focus:outline-none transition">
                <select id="reg-gender"
                    class="flex-1 min-w-0 px-3 py-2.5 mb-2.5 border border-gray-200 rounded-none text-xs focus:border-emerald-600 focus:outline-none transition">
                    <option value="">Gender</option><option>Male</option><option>Female</option><option>Other</option>
                </select>
            </div>
            <input type="text" id="reg-address" placeholder="Address"
                class="w-full px-3 py-2.5 mb-2.5 border border-gray-200 rounded-none text-xs focus:border-emerald-600 focus:outline-none transition">
            <div class="flex gap-5 mb-3 py-1">
                <label class="flex items-center gap-2 cursor-pointer text-xs">
                    <input type="radio" name="role" value="TEACHER" checked class="accent-emerald-600"> Teacher
                </label>
                <label class="flex items-center gap-2 cursor-pointer text-xs">
                    <input type="radio" name="role" value="STUDENT" class="accent-emerald-600"> Student
                </label>
            </div>
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-2.5 rounded-none text-xs font-semibold transition cursor-pointer">Register</button>
        </form>

        <div id="auth-error" class="text-red-500 text-xs mt-2 text-center"></div>
    </div>

    <script src="shared/api.js"></script>
    <script src="shared/helpers.js"></script>
    <script src="shared/ui.js"></script>
    <script>
    function showTab(tab) {
        if (tab === 'login') {
            $('#login-form').show(); $('#register-form').hide();
            $('#login-tab').addClass('text-emerald-700 border-emerald-600').removeClass('text-gray-400 border-transparent');
            $('#register-tab').addClass('text-gray-400 border-transparent').removeClass('text-emerald-700 border-emerald-600');
        } else {
            $('#login-form').hide(); $('#register-form').show();
            $('#register-tab').addClass('text-emerald-700 border-emerald-600').removeClass('text-gray-400 border-transparent');
            $('#login-tab').addClass('text-gray-400 border-transparent').removeClass('text-emerald-700 border-emerald-600');
        }
        $('#auth-error').text('');
    }

    $(function() {
        if (getToken() && getRole()) { window.location.href = getDashboardUrl(); return; }

        $('#login-form').on('submit', function(e) {
            e.preventDefault();
            api('POST', '/auth/login', {
                email: $('#login-email').val(),
                password: $('#login-password').val()
            }).done(function(data) {
                saveAuth(data);
                window.location.href = getDashboardUrl();
            }).fail(function(xhr) { $('#auth-error').text(ajaxErr(xhr)); });
        });

        $('#register-form').on('submit', function(e) {
            e.preventDefault();
            api('POST', '/auth/register', {
                username: $('#reg-username').val(),
                email: $('#reg-email').val(),
                password: $('#reg-password').val(),
                role: $('input[name="role"]:checked').val(),
                nic: $('#reg-nic').val() || null,
                contactNumber: $('#reg-contact').val() || null,
                dateOfBirth: $('#reg-dob').val() || null,
                gender: $('#reg-gender').val() || null,
                address: $('#reg-address').val() || null
            }).done(function(data) {
                saveAuth(data);
                window.location.href = getDashboardUrl();
            }).fail(function(xhr) { $('#auth-error').text(ajaxErr(xhr)); });
        });
    });
    </script>
</body>
</html>
