<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Exam Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Poppins','sans-serif']}}}}</script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen text-sm text-gray-700">
    <header class="flex items-center justify-between px-6 py-4 bg-white border-b border-gray-200 sticky top-0 z-10">
        <h2 class="text-base font-semibold"><i class="fa-solid fa-user mr-1"></i> My Profile</h2>
        <button onclick="window.location.href=getDashboardUrl()" class="px-4 py-2 text-sm border border-gray-300 rounded-none hover:bg-gray-50 transition">← Back</button>
    </header>
    <div class="p-6 grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-white rounded-none p-6 shadow-sm border border-gray-100">
            <h3 class="text-sm font-semibold mb-4">Profile Info</h3>
            <form id="profile-form">
                <div class="flex gap-3">
                    <div class="flex-1 mb-3"><label class="block text-sm font-semibold text-gray-600 mb-1">Username</label>
                        <input type="text" id="prof-username" class="w-full px-4 py-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none"></div>
                    <div class="flex-1 mb-3"><label class="block text-sm font-semibold text-gray-600 mb-1">Email</label>
                        <input type="email" id="prof-email" class="w-full px-4 py-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none"></div>
                </div>
                <div class="flex gap-3">
                    <div class="flex-1 mb-3"><label class="block text-sm font-semibold text-gray-600 mb-1">NIC</label>
                        <input type="text" id="prof-nic" class="w-full px-4 py-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none"></div>
                    <div class="flex-1 mb-3"><label class="block text-sm font-semibold text-gray-600 mb-1">Contact</label>
                        <input type="text" id="prof-contact" class="w-full px-4 py-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none"></div>
                </div>
                <div class="flex gap-3">
                    <div class="flex-1 mb-3"><label class="block text-sm font-semibold text-gray-600 mb-1">Date of Birth</label>
                        <input type="date" id="prof-dob" class="w-full px-4 py-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none"></div>
                    <div class="flex-1 mb-3"><label class="block text-sm font-semibold text-gray-600 mb-1">Gender</label>
                        <select id="prof-gender" class="w-full px-4 py-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none">
                            <option value="">Select</option><option>Male</option><option>Female</option><option>Other</option>
                        </select></div>
                </div>
                <div class="mb-3"><label class="block text-sm font-semibold text-gray-600 mb-1">Address</label>
                    <input type="text" id="prof-address" class="w-full px-4 py-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none"></div>
                <button type="submit" class="px-6 py-3 bg-emerald-600 text-white rounded-none font-semibold hover:bg-emerald-700 transition">Update Profile</button>
            </form>
        </div>
        <div class="bg-white rounded-none p-6 shadow-sm border border-gray-100">
            <h3 class="text-sm font-semibold mb-4">Change Password</h3>
            <form id="password-form">
                <div class="mb-3"><label class="block text-sm font-semibold text-gray-600 mb-1">Current Password</label>
                    <input type="password" id="pwd-current" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none"></div>
                <div class="mb-3"><label class="block text-sm font-semibold text-gray-600 mb-1">New Password</label>
                    <input type="password" id="pwd-new" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none"></div>
                <div class="mb-3"><label class="block text-sm font-semibold text-gray-600 mb-1">Confirm Password</label>
                    <input type="password" id="pwd-confirm" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none"></div>
                <button type="submit" class="px-6 py-3 bg-emerald-600 text-white rounded-none font-semibold hover:bg-emerald-700 transition">Change Password</button>
            </form>
        </div>
    </div>

    <script src="../shared/api.js"></script>
    <script src="../shared/helpers.js"></script>
    <script src="../shared/ui.js"></script>
    <script src="profile.js"></script>
</body>
</html>
