<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publish Exam - Exam Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Poppins','sans-serif']}}}}</script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen text-sm text-gray-700">
    <header class="flex items-center justify-between px-6 py-4 bg-white border-b border-gray-200 sticky top-0 z-10">
        <h2 class="text-base font-semibold">Publish New Exam</h2>
        <button onclick="window.location.href='dashboard.html'" class="px-4 py-2 text-sm border border-gray-300 rounded-none hover:bg-gray-50 transition">← Back</button>
    </header>

    <form id="publish-form" class="p-6">
        <div class="flex gap-3 mb-3">
            <input type="text" id="pub-title" placeholder="Exam Title" required class="flex-1 px-4 py-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none">
            <input type="number" id="pub-duration" placeholder="Duration (minutes)" min="1" required class="w-48 px-4 py-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none">
        </div>
        <textarea id="pub-desc" placeholder="Description (optional)" rows="2" class="w-full px-4 py-3 mb-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none"></textarea>
        <div class="flex gap-3 mb-4">
            <div class="flex-1">
                <label class="block text-sm font-semibold text-gray-600 mb-1">Questions per Student</label>
                <input type="number" id="pub-count" placeholder="e.g. 10" min="1" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none">
                <small class="text-gray-400 text-xs">Each student gets this many random questions from the pool</small>
            </div>
            <div class="flex-1">
                <label class="block text-sm font-semibold text-gray-600 mb-1">Start Date/Time</label>
                <input type="datetime-local" id="pub-start" class="w-full px-4 py-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none">
            </div>
            <div class="flex-1">
                <label class="block text-sm font-semibold text-gray-600 mb-1">End Date/Time</label>
                <input type="datetime-local" id="pub-end" class="w-full px-4 py-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none">
            </div>
        </div>
        <h3 class="text-sm font-semibold mb-2">Select Questions for the Pool</h3>
        <p class="text-gray-400 text-sm mb-4">Pick entire papers and/or individual questions.</p>
        <div id="question-sets"></div>
        <div class="flex items-center justify-between mt-4 pt-4 border-t border-gray-200">
            <span id="selected-count" class="text-emerald-700 font-semibold">0 questions in pool</span>
            <button type="submit" class="px-6 py-3 bg-emerald-600 text-white rounded-none font-semibold hover:bg-emerald-700 transition">Publish Exam</button>
        </div>
    </form>

    <script src="../shared/api.js"></script>
    <script src="../shared/helpers.js"></script>
    <script src="../shared/ui.js"></script>
    <script src="publish-exam.js"></script>
</body>
</html>
