<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Set - Exam Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Poppins','sans-serif']}}}}</script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen text-sm text-gray-700">
    <header class="flex items-center justify-between px-6 py-4 bg-white border-b border-gray-200 sticky top-0 z-10">
        <div>
            <h2 id="set-title" class="text-base font-semibold"></h2>
            <span id="set-subject" class="text-gray-500 text-sm"></span>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="showAddModal()" class="px-4 py-2 text-sm bg-emerald-600 text-white rounded-none hover:bg-emerald-700 transition">+ Add Question</button>
            <button onclick="window.location.href='dashboard.html'" class="px-4 py-2 text-sm border border-gray-300 rounded-none hover:bg-gray-50 transition">← Back</button>
        </div>
    </header>
    <div id="questions-container" class="p-6"></div>

    <!-- Add/Edit Question Modal -->
    <div id="q-modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
        <div class="bg-white rounded-none p-7 w-[600px] max-w-[90vw] max-h-[85vh] overflow-y-auto shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <h3 id="q-modal-title" class="text-sm font-semibold">Add Question</h3>
                <button onclick="$('#q-modal').addClass('hidden')" class="text-2xl text-gray-400 hover:text-gray-600 leading-none">&times;</button>
            </div>
            <form id="q-form">
                <input type="hidden" id="edit-q-id">
                <textarea id="q-text" placeholder="Question Text" rows="3" required class="w-full px-4 py-3 mb-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none"></textarea>
                <div class="flex gap-3">
                    <input type="text" id="q-optA" placeholder="Option A" required class="flex-1 px-4 py-3 mb-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none">
                    <input type="text" id="q-optB" placeholder="Option B" required class="flex-1 px-4 py-3 mb-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none">
                </div>
                <div class="flex gap-3">
                    <input type="text" id="q-optC" placeholder="Option C" required class="flex-1 px-4 py-3 mb-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none">
                    <input type="text" id="q-optD" placeholder="Option D" required class="flex-1 px-4 py-3 mb-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none">
                </div>
                <div class="flex gap-3">
                    <input type="text" id="q-correct" placeholder="Correct Answer (exact text)" required class="flex-1 px-4 py-3 mb-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none">
                    <input type="text" id="q-lesson" placeholder="Lesson Name (optional)" class="flex-1 px-4 py-3 mb-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none">
                </div>
                <input type="number" id="q-marks" placeholder="Marks (default: 1)" step="0.5" min="0.5" class="w-full px-4 py-3 mb-3 border-2 border-gray-200 rounded-none focus:border-emerald-600 focus:outline-none">
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-none font-semibold transition">Save Question</button>
            </form>
        </div>
    </div>

    <script src="../shared/api.js"></script>
    <script src="../shared/helpers.js"></script>
    <script src="../shared/ui.js"></script>
    <script src="set-detail.js"></script>
</body>
</html>
